<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Smart Recycle - Sign Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Base Styles */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Top Header (Light Green) */
        .top-nav-green {
            background-color: #8CC63F; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
            height: 60px;
        }
        
        .logo-section-top { display: flex; align-items: center; gap: 15px; }
        .logo-section-top img { width: 50px; height: auto; }
        .logo-section-top h1 { margin: 0; font-size: 22px; color: #000; }
        
        .user-profile-top { display: flex; align-items: center; gap: 10px; font-size: 18px; }
        .profile-circle-gray {
            background-color: #666; color: white; width: 40px; height: 40px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px;
        }

        /* Main Layout Setup */
        .layout-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Left Sidebar */
        .sidebar-left {
            width: 250px;
            background-color: #DDE2E2;
            padding-top: 20px;
            border-right: 1px solid #ccc;
        }

        .sidebar-menu { list-style: none; padding: 0; margin: 0; }
        .sidebar-menu li a {
            display: flex; align-items: center; gap: 15px; padding: 15px 30px;
            color: #333; text-decoration: none; font-size: 16px;
        }
        .sidebar-menu li a i { font-size: 20px; width: 25px; text-align: center; }

        /* Main Content Area */
        .main-content {
            flex: 1;
            background-color: #C4C4C4;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            overflow-y: auto;
        }

        /* White Sign Up Card */
        .signup-card {
            background-color: white;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Inline Header (Logo + Text) */
        .form-header-inline {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        .form-header-inline img { width: 50px; height: auto; }
        .form-header-inline h2 { margin: 0; font-size: 28px; color: #000; font-family: Arial, sans-serif; font-weight: bold; }

        /* Form Elements */
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block; 
            font-family: 'Georgia', serif; 
            font-weight: bold;
            margin-bottom: 5px; 
            color: #000; 
            font-size: 14px;
        }

        /* Icons inside inputs */
        .input-with-icon {
            position: relative;
        }
        .input-with-icon i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #333;
            font-size: 14px;
        }
        .input-with-icon input {
            width: 100%; 
            padding: 10px 10px 10px 35px;
            background-color: #D9D9D9; 
            border: none;
            box-sizing: border-box; 
            font-family: Arial, sans-serif; 
            font-size: 14px;
        }

        /* Helper Text (At least 8 character) */
        .helper-text {
            font-size: 10px;
            color: #000;
            margin-top: -10px;
            margin-bottom: 10px;
            font-family: 'Georgia', serif;
        }

        /* Role Selection Area */
        .role-section {
            margin-top: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .role-options {
            display: flex; justify-content: center; gap: 20px; font-family: Arial, sans-serif; font-size: 14px;
        }

        /* Centered Green Button */
        .btn-signup-green {
            background-color: #008040;
            color: white; 
            border: none;
            padding: 10px 30px; 
            font-size: 16px; 
            font-family: 'Georgia', serif;
            font-weight: bold;
            cursor: pointer; 
            display: block;
            margin: 0 auto;
        }
        .btn-signup-green:hover { background-color: #005a2e; }

    </style>
</head>
<body>

    <header class="top-nav-green">
        <div class="logo-section-top">
            <img src="logo.png" alt="E-Smart Recycle Logo">
            <a href="login_page.html" style="text-decoration: none;"><h1>E-Smart Recycle</h1></a>
        </div>
        <div class="user-profile-top">
            <div class="profile-circle-gray">
                <i class="fas fa-user"></i>
            </div>
        </div>
    </header>

    <div class="layout-container">
        
        <aside class="sidebar-left">
            <ul class="sidebar-menu">
                <li><a href="#"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="#"><i class="fas fa-box"></i> Submit Item</a></li>
                <li><a href="#"><i class="fas fa-history"></i> Request History</a></li>
                <li><a href="#"><i class="fas fa-bell"></i> Notification</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="signup-card">
                
                <div class="form-header-inline">
                    <img src="logo.png" alt="E-Smart Recycle Logo">
                    <h2>Sign Up</h2>
                </div>

                <form id="signupForm" onsubmit="handleSignUp(event)">
                    
                    <div class="input-group">
                        <label>Full Name</label>
                        <div class="input-with-icon">
                            <i class="far fa-user"></i>
                            <input type="text" id="signupName" placeholder="Full Name" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Email</label>
                        <div class="input-with-icon">
                            <i class="far fa-envelope"></i>
                            <input type="email" id="signupEmail" placeholder="Email" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <div class="input-with-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="signupPassword" placeholder="Password" minlength="8" required>
                        </div>
                    </div>

                    <div class="helper-text">At least 8 character</div>
                    
                    <div class="input-group">
                        <label>Confirm Password</label>
                        <div class="input-with-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="signupConfirmPassword" placeholder="Password" minlength="8" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Phone Number</label>
                        <div class="input-with-icon">
                            <i class="fas fa-phone-alt"></i>
                            <input type="tel" id="signupPhone" placeholder="Phone Number" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Address</label>
                        <div class="input-with-icon">
                            <i class="fas fa-map-marker-alt"></i>
                            <input type="text" id="signupAddress" placeholder="Address" required>
                        </div>
                    </div>

                    <div class="role-section">
                        <div class="role-options">
                            <label style="cursor: pointer;"><input type="radio" name="role" value="user" required checked> Register as User</label>
                            <label style="cursor: pointer;"><input type="radio" name="role" value="collector"> Register as Collector</label>
                        </div>
                    </div>

                    <button type="submit" class="btn-signup-green">Sign Up</button>
                    
                </form>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        // Import Auth and signOut so we can log them out immediately after creation
        import { getAuth, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        // Import Firestore to save the data!
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // Your exact Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyC5yA_CKK4xZ8bsx-Qutca7lym6i5oJdpo",
            authDomain: "e-smartrecyclesystem.firebaseapp.com",
            projectId: "e-smartrecyclesystem",
            storageBucket: "e-smartrecyclesystem.firebasestorage.app",
            messagingSenderId: "212695525607",
            appId: "1:212695525607:web:61d0df7011aa8baf265a42"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app); // Using Firestore!

        window.handleSignUp = async function(event) {
            event.preventDefault(); 
            
            // Grab exact IDs matching the HTML above
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPass = document.getElementById('signupConfirmPassword').value;
            const phone = document.getElementById('signupPhone').value;
            const address = document.getElementById('signupAddress').value;
            
            // Get which radio button is selected
            const role = document.querySelector('input[name="role"]:checked').value;

            // Check if passwords match
            if (password !== confirmPass) {
                alert("Error: Passwords do not match!");
                return;
            }

            try {
                // 1. CREATE ACCOUNT IN FIREBASE AUTHENTICATION
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // 2. SAVE EXTRA DETAILS IN FIRESTORE
                const userRef = doc(db, "users", user.uid);
                await setDoc(userRef, {
                    fullName: name,
                    email: email,
                    phone: phone,
                    address: address,
                    role: role,
                    createdAt: new Date().toLocaleString()
                });
                
                // 3. SUCCESS MESSAGE & REDIRECT
                alert("Account created successfully! Please log in.");
                
                // Log them out so they can properly test the login page
                await signOut(auth);
                
                // Redirect to the login page (Make sure your login page is named index.html!)
                window.location.href = "login_page.html"; 

            } catch (error) {
                alert("Error: " + error.message);
            }
        };
    </script>
</body>
</html>
