<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Smart Recycle - My Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="user_profile.css">
</head>
<body>

    <header class="top-nav-green">
        <div class="logo-section-top">
            <img src="logo.png" alt="E-Smart Recycle Logo">
            <a href="dashboard.html" style="text-decoration: none;"><h1>E-Smart Recycle</h1></a>
        </div>

        <div class="user-profile-top">
            <span id="userNameDisplay">Loading...</span>
            <div class="profile-circle-gray" onclick="toggleProfileMenu()">
                <i class="fas fa-user"></i>
            </div>

            <div id="profileDropdown" class="profile-dropdown">
                <a href="user_profile.html"><i class="far fa-id-badge"></i> Profile</a>
                <a href="#" onclick="logoutUser(event)"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>
    </header>

    <div class="layout-container">
        <aside class="sidebar-left">
            <ul class="sidebar-menu">
                <li><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="selectpickup.html"><i class="fas fa-box"></i> Submit Item</a></li>
                <li><a href="user_history.html"><i class="fas fa-history"></i> Request History</a></li>
                <li><a href="user_notification.html"><i class="fas fa-bell"></i> Notification</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="profile-card">
                
                <div class="profile-header">
                    <div class="big-avatar"><i class="fas fa-user"></i></div>
                    <h2 id="headerName">My Profile</h2>
                    <p id="headerRole">User Account</p>
                </div>

                <form id="profileForm" onsubmit="updateProfile(event)">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="profName" required>
                    </div>

                    <div class="form-group">
                        <label>Email Address (Cannot be changed)</label>
                        <input type="email" id="profEmail" disabled>
                    </div>

                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="profPhone" required>
                    </div>

                    <div class="form-group">
                        <label>Home Address</label>
                        <input type="text" id="profAddress" required>
                    </div>

                    <button type="submit" class="btn-save" id="saveBtn">Save Changes</button>
                </form>

            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        
        // 1. IMPORT REALTIME DATABASE TOOLS
        import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        // Your exact Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyC5yA_CKK4xZ8bsx-Qutca7lym6i5oJdpo",
            authDomain: "e-smartrecyclesystem.firebaseapp.com",
            databaseURL: "PASTE_YOUR_DATABASE_URL_HERE", // <-- ADD YOUR REALTIME DB LINK HERE!
            projectId: "e-smartrecyclesystem",
            storageBucket: "e-smartrecyclesystem.firebasestorage.app",
            messagingSenderId: "212695525607",
            appId: "1:212695525607:web:61d0df7011aa8baf265a42"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        // 2. INITIALIZE REALTIME DB
        const db = getDatabase(app);

        let currentUserId = null;

        // 3. LOAD DATA WHEN PAGE OPENS
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserId = user.uid;
                
                // Point to the 'users' folder in Realtime DB
                const userRef = ref(db, 'users/' + user.uid);
                
                get(userRef).then((snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        
                        // Fill the top-right name
                        document.getElementById('userNameDisplay').innerText = data.fullName;
                        
                        // Fill the big profile header
                        document.getElementById('headerName').innerText = data.fullName;
                        document.getElementById('headerRole').innerText = (data.role ? data.role.toUpperCase() : "USER") + " ACCOUNT";

                        // Fill the form boxes automatically
                        document.getElementById('profName').value = data.fullName;
                        document.getElementById('profEmail').value = data.email;
                        document.getElementById('profPhone').value = data.phone;
                        document.getElementById('profAddress').value = data.address;
                    }
                }).catch((error) => {
                    console.error("Error fetching user data:", error);
                });
            } else {
                // Kick back to login if they aren't signed in
                window.location.href = "index.html";
            }
        });

        // 4. SAVE NEW DATA WHEN BUTTON IS CLICKED
        window.updateProfile = function(event) {
            event.preventDefault();
            
            const btn = document.getElementById('saveBtn');
            btn.innerText = "Saving...";
            
            const newName = document.getElementById('profName').value;
            const newPhone = document.getElementById('profPhone').value;
            const newAddress = document.getElementById('profAddress').value;

            // Point to this specific user in the database
            const userRef = ref(db, 'users/' + currentUserId);
            
            // Update the specific fields in Realtime Database
            update(userRef, {
                fullName: newName,
                phone: newPhone,
                address: newAddress
            }).then(() => {
                // Update the names on the screen immediately without refreshing
                document.getElementById('userNameDisplay').innerText = newName;
                document.getElementById('headerName').innerText = newName;

                alert("Profile updated successfully!");
                btn.innerText = "Save Changes";
            }).catch((error) => {
                alert("Error updating profile: " + error.message);
                btn.innerText = "Save Changes";
            });
        };

        // --- DROPDOWN & LOGOUT FUNCTIONS ---
        window.toggleProfileMenu = function() {
            document.getElementById("profileDropdown").classList.toggle("show-dropdown");
        };

        window.onclick = function(event) {
            if (!event.target.matches('.profile-circle-gray') && !event.target.matches('.fa-user') && !event.target.matches('.profile-circle')) {
                const dropdowns = document.getElementsByClassName("profile-dropdown");
                for (let i = 0; i < dropdowns.length; i++) {
                    if (dropdowns[i].classList.contains('show-dropdown')) {
                        dropdowns[i].classList.remove('show-dropdown');
                    }
                }
            }
        };

        window.logoutUser = function(event) {
            event.preventDefault();
            signOut(auth).then(() => {
                window.location.href = "index.html";
            });
        };
    </script>
</body>
</html>
