<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Smart Recycle - User Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* =========================================================
           BASE LAYOUT & HORIZONTAL NAV
           ========================================================= */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        .top-nav-green {
            background-color: #8CC63F; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
            height: 60px;
        }

        .logo-section-top { display: flex; align-items: center; gap: 15px; }
        .logo-section-top img { width: 50px; height: auto; }
        .logo-section-top h1 { margin: 0; font-size: 22px; color: #000; }

        .user-profile-top { display: flex; align-items: center; gap: 10px; font-size: 16px; color: #000; position: relative;}
        .profile-circle-gray {
            background-color: #555; color: white; width: 35px; height: 35px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 16px; cursor: pointer;
        }

        .profile-dropdown {
            display: none; position: absolute; top: 50px; right: 0; background-color: white; 
            min-width: 160px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border-radius: 6px; z-index: 1000; flex-direction: column;
        }
        .profile-dropdown a { color: #333; padding: 15px 20px; text-decoration: none; display: flex; align-items: center; gap: 12px; font-size: 15px; border-bottom: 1px solid #f0f0f0; }
        .profile-dropdown a:hover { background-color: #f9f9f9; color: #1a8a4c; }
        .show-dropdown { display: flex !important; }

        .navbar {
            background-color: #0f7a45; 
            display: flex;
            padding: 0 10px;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            border-right: 1px solid rgba(255, 255, 255, 0.2);
        }

        .nav-link:last-child { border-right: none; }
        .nav-link:hover, .nav-link.active { background-color: #149c57; }

        .collector-main-bg {
            background-color: #C4C4C4;
            flex: 1;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
        }

        /* =========================================================
           ADMIN USER MANAGEMENT STYLES
           ========================================================= */
        .admin-card {
            background-color: white;
            width: 100%;
            max-width: 1000px;
            padding: 40px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-radius: 4px;
        }

        .admin-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .admin-header-row h2 {
            font-family: 'Georgia', serif;
            font-size: 28px;
            font-weight: bold;
            color: #000;
            margin: 0;
        }

        .admin-search-container {
            position: relative;
            margin-bottom: 30px;
        }

        .admin-search-container input {
            width: 100%;
            padding: 15px 20px;
            background-color: #E0E0E0; 
            border: none;
            box-sizing: border-box;
            font-family: 'Georgia', serif;
            font-size: 15px;
            color: #333;
            outline: none;
        }

        .admin-search-container i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0a0a0;
            font-size: 18px;
        }

        .admin-table-container {
            background-color: #D9D9D9; 
            padding: 25px;
            overflow-x: auto;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Georgia', serif;
        }

        .admin-table th {
            text-align: left;
            padding-bottom: 20px;
            font-weight: bold;
            font-size: 16px;
            color: #000;
            border-bottom: 2px solid rgba(0,0,0,0.1);
        }

        .admin-table td {
            padding: 15px 0;
            font-size: 15px;
            color: #333;
            vertical-align: middle;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .role-badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            color: white;
            font-family: Arial, sans-serif;
        }
        .role-admin { background-color: #333; }
        .role-collector { background-color: #008040; }
        .role-user { background-color: #007bff; }

        /* --- DELETE BUTTON STYLE --- */
        .btn-delete {
            background-color: #C00000; /* Red color */
            color: white;
            border: none;
            padding: 8px 12px;
            font-size: 13px;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-delete:hover {
            background-color: #a00000;
        }
    </style>
</head>
<body>

    <header class="top-nav-green">
        <div class="logo-section-top">
            <img src="logo.png" alt="E-Smart Recycle Logo" style="width: 50px; height: auto;">
            <a href="admin_dashboard.html" style="text-decoration: none;"><h1>E-Smart Recycle</h1></a>
        </div>
        <div class="user-profile-top">
            <span id="userNameDisplay">Loading...</span>
            <div class="profile-circle-gray" onclick="toggleProfileMenu()">
                <i class="fas fa-user-shield"></i>
            </div>
            
            <div id="profileDropdown" class="profile-dropdown">
                <a href="admin_profile.html"><i class="far fa-id-badge"></i> Profile</a>
                <a href="login_page" onclick="logoutUser(event)"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>
    </header>

    <nav class="navbar">
        <a href="admin_dashboard.html" class="nav-link"><i class="fa-solid fa-house"></i> Dashboard</a>
        <a href="adminusermanagement.html" class="nav-link active"><i class="fa-regular fa-user"></i> User</a>
        <a href="collect_record.html" class="nav-link"><i class="fa-solid fa-clipboard-list"></i> Collector Records</a>
        <a href="admin_report.html" class="nav-link"><i class="fa-solid fa-chart-bar"></i> Reports</a>
        <a href="admin_notification.html" class="nav-link"><i class="fa-regular fa-bell"></i> Notification</a>
    </nav>

    <main class="collector-main-bg">
        <div class="admin-card">
            
            <div class="admin-header-row">
                <h2>User Management</h2>
            </div>

            <div class="admin-search-container">
                <input type="text" id="searchInput" onkeyup="searchTable()" placeholder="Search by name, email, or role...">
                <i class="fas fa-search"></i>
            </div>

            <div class="admin-table-container">
                <table class="admin-table" id="userTable">
                    <thead>
                        <tr>
                            <th>User ID</th>
                            <th>Full Name</th>
                            <th>Role</th>
                            <th>Email Address</th>
                            <th>Phone</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <tr>
                            <td colspan="6" style="text-align: center; padding: 20px;">Loading users from database...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        
        // Imported deleteDoc right here
        import { getFirestore, doc, getDoc, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // Your exact Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyC5yA_CKK4xZ8bsx-Qutca7lym6i5oJdpo",
            authDomain: "e-smartrecyclesystem.firebaseapp.com",
            projectId: "e-smartrecyclesystem",
            storageBucket: "e-smartrecyclesystem.firebasestorage.app",
            messagingSenderId: "212695525607",
            appId: "1:212695525607:web:61d0df7011aa8baf265a42"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Verify Admin Status
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);

                if (userSnap.exists()) {
                    if (userSnap.data().role !== "admin") {
                        alert("Access Denied: You do not have administrator privileges.");
                        window.location.href = "index.html"; 
                        return;
                    }
                    document.getElementById('userNameDisplay').innerText = userSnap.data().fullName;
                }

                loadUsers();

            } else {
                window.location.href = "index.html"; 
            }
        });

        // Makes loadUsers globally accessible so deleteUser() can refresh the table
        window.loadUsers = async function() {
            const tableBody = document.getElementById('userTableBody');
            
            try {
                const querySnapshot = await getDocs(collection(db, "users"));
                let tableHTML = "";

                querySnapshot.forEach((docSnap) => {
                    const userData = docSnap.data();
                    const shortId = "#" + docSnap.id.substring(0, 6).toUpperCase(); 
                    
                    const role = userData.role ? userData.role.toLowerCase() : "user";
                    let roleDisplay = "User";
                    let badgeClass = "role-user";
                    
                    if (role === "admin") {
                        roleDisplay = "Admin";
                        badgeClass = "role-admin";
                    } else if (role === "collector") {
                        roleDisplay = "Collector";
                        badgeClass = "role-collector";
                    }

                    // Build table row with the Delete button
                    tableHTML += `
                        <tr>
                            <td style="font-weight: bold; color: #555;">${shortId}</td>
                            <td>${userData.fullName || 'N/A'}</td>
                            <td><span class="role-badge ${badgeClass}">${roleDisplay}</span></td>
                            <td>${userData.email || 'N/A'}</td>
                            <td>${userData.phone || 'N/A'}</td>
                            <td>
                                ${role === 'admin' ? 
                                    `<span style="color: #888; font-size: 13px;">Cannot Delete Admin</span>` : 
                                    `<button class="btn-delete" onclick="deleteUser('${docSnap.id}')">
                                        <i class="fas fa-trash"></i> Delete
                                    </button>`
                                }
                            </td>
                        </tr>
                    `;
                });

                tableBody.innerHTML = tableHTML || "<tr><td colspan='6' style='text-align: center;'>No users found.</td></tr>";

            } catch (error) {
                console.error("Error fetching users:", error);
                tableBody.innerHTML = "<tr><td colspan='6' style='text-align: center; color: red;'>Error loading users.</td></tr>";
            }
        };

        // --- DELETE USER FUNCTION ---
        window.deleteUser = async function(userId) {
            const confirmDelete = confirm("Are you sure you want to completely delete this user? They will immediately lose access to the system. This cannot be undone.");
            
            if (confirmDelete) {
                try {
                    // Connect to Firestore and permanently delete the file
                    await deleteDoc(doc(db, "users", userId));
                    alert("User account has been successfully removed!");
                    
                    // Instantly refresh the table to remove them from the screen
                    window.loadUsers(); 

                } catch (error) {
                    alert("Error deleting user: " + error.message);
                }
            }
        };

        // --- GLOBAL FUNCTIONS ---
        window.searchTable = function() {
            const input = document.getElementById("searchInput");
            const filter = input.value.toLowerCase();
            const tableBody = document.getElementById("userTableBody");
            const tr = tableBody.getElementsByTagName("tr");

            for (let i = 0; i < tr.length; i++) {
                if (tr[i].getElementsByTagName("td").length === 1) continue; 
                
                const rowText = tr[i].textContent || tr[i].innerText;
                
                if (rowText.toLowerCase().indexOf(filter) > -1) {
                    tr[i].style.display = ""; 
                } else {
                    tr[i].style.display = "none"; 
                }
            }
        };

        // --- DROPDOWN & LOGOUT FUNCTIONS ---
        window.toggleProfileMenu = function() {
            document.getElementById("profileDropdown").classList.toggle("show-dropdown");
        };

        window.onclick = function(event) {
            if (!event.target.matches('.profile-circle-gray') && !event.target.matches('.fa-user-shield') && !event.target.matches('.profile-circle')) {
                const dropdowns = document.getElementsByClassName("profile-dropdown");
                for (let i = 0; i < dropdowns.length; i++) {
                    if (dropdowns[i].classList.contains('show-dropdown')) {
                        dropdowns[i].classList.remove('show-dropdown');
                    }
                }
            }
        };

        window.logoutUser = function(event) {
            event.preventDefault();
            signOut(auth).then(() => {
                window.location.href = "login_page.html";
            });
        };
    </script>
</body>
</html>
