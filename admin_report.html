<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Smart Recycle - Admin Reports</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="admin_report.css">
    
    <style>
        .top-nav-green {
            background-color: #8CC63F; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
            height: 60px;
        }
        .logo-section-top { display: flex; align-items: center; gap: 15px; }
        .logo-section-top img { width: 50px; height: auto; }
        .logo-section-top h1 { margin: 0; font-size: 22px; color: #000; font-family: Arial, sans-serif;}

        .user-profile-top { display: flex; align-items: center; gap: 10px; font-size: 16px; color: #000; position: relative; font-family: Arial, sans-serif;}
        .profile-circle-gray {
            background-color: #555; color: white; width: 35px; height: 35px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 16px; cursor: pointer;
        }

        .profile-dropdown {
            display: none; position: absolute; top: 50px; right: 0; background-color: white; 
            min-width: 160px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border-radius: 6px; z-index: 1000; flex-direction: column;
        }
        .profile-dropdown a { color: #333; padding: 15px 20px; text-decoration: none; display: flex; align-items: center; gap: 12px; font-size: 15px; border-bottom: 1px solid #f0f0f0; }
        .profile-dropdown a:hover { background-color: #f9f9f9; color: #1a8a4c; }
        .show-dropdown { display: flex !important; }
    </style>
</head>
<body>

    <div class="app-container" style="max-width: 100%;">
        
        <header class="top-nav-green">
            <div class="logo-section-top">
                <img src="logo.png" alt="E-Smart Recycle Logo">            
                <a href="admin_dashboard.html" style="text-decoration: none;"><h1>E-Smart Recycle</h1></a>
            </div>
            <div class="user-profile-top">
                <span id="userNameDisplay">Loading...</span>
                <div class="profile-circle-gray" onclick="toggleProfileMenu()">
                    <i class="fas fa-user-shield"></i>
                </div>
                
                <div id="profileDropdown" class="profile-dropdown">
                    <a href="admin_profile.html"><i class="far fa-id-badge"></i> Profile</a>
                    <a href="#" onclick="logoutUser(event)"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </div>
            </div>
        </header>

        <nav class="navbar">
            <a href="admin_dashboard.html" class="nav-link"><i class="fa-solid fa-house"></i> Dashboard</a>
            <a href="adminusermanagement.html" class="nav-link"><i class="fa-regular fa-user"></i> User</a>
            <a href="collect_record.html" class="nav-link"><i class="fa-solid fa-clipboard-list"></i> Collector Records</a>
            <a href="admin_report.html" class="nav-link active"><i class="fa-solid fa-chart-bar"></i> Reports</a>
            <a href="admin_notification.html" class="nav-link"><i class="fa-regular fa-bell"></i> Notification</a>
        </nav>

        <main class="main-content" style="display: flex; justify-content: center;">
            <div class="content-card" style="width: 100%; max-width: 1100px;">
                <h1>System Reports</h1>

                <!-- UPDATED DROP DOWNS -->
                <div class="controls">
                    <select class="dropdown" id="reportTypeSelect">
                        <option value="" disabled selected hidden>Select Report Type</option>
                        <option value="Collection Summary">Collection Summary</option>
                        <option value="User Summary">User Data Summary</option>
                    </select>

                    <select class="dropdown" id="dateRangeSelect">
                        <option value="" disabled selected hidden>Date Range</option>
                        <option value="Today">Today</option>
                        <option value="Last 7 Days">Last 7 Days</option>
                        <option value="Last 30 Days">Last 30 Days</option>
                        <option value="This Month">This Month</option>
                        <option value="All Time">All Time</option>
                    </select>

                    <button type="button" class="btn-generate" id="generateBtn" onclick="generateAdminReport()">Generate Report</button>
                    <button type="button" class="btn-export" onclick="exportPDF()"><i class="fa-solid fa-download"></i> Export PDF</button>
                </div>

                <hr class="divider">

                <div id="reportResult" style="display: none;">
                    
                    <h2 id="reportTitle">Collection Summary Report</h2>
                    
                    <!-- Dynamic Summary Cards Container -->
                    <div class="summary-cards" id="dynamicSummaryCards">
                        <!-- Cards are injected here by JS -->
                    </div>

                    <div class="table-wrapper">
                        <table>
                            <thead id="dynamicTableHeader">
                                <!-- Headers are injected here by JS -->
                            </thead>
                            <tbody id="reportTableBody">
                                <!-- Table Data goes here -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // Your exact Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyC5yA_CKK4xZ8bsx-Qutca7lym6i5oJdpo",
            authDomain: "e-smartrecyclesystem.firebaseapp.com",
            projectId: "e-smartrecyclesystem",
            storageBucket: "e-smartrecyclesystem.firebasestorage.app",
            messagingSenderId: "212695525607",
            appId: "1:212695525607:web:61d0df7011aa8baf265a42"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app); 
        window.db = db; 

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Verify Admin Status
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);

                if (userSnap.exists()) {
                    if (userSnap.data().role !== "admin") {
                        alert("Access Denied: You do not have administrator privileges.");
                        window.location.href = "index.html"; 
                        return;
                    }
                    document.getElementById('userNameDisplay').innerText = userSnap.data().fullName;
                }
            } else {
                window.location.href = "index.html"; // Kick to login
            }
        });

        // --- UPGRADED REAL-TIME REPORT GENERATION ---
        window.generateAdminReport = async function() {
            const reportType = document.getElementById('reportTypeSelect').value;
            const dateRange = document.getElementById('dateRangeSelect').value;
            const generateBtn = document.getElementById('generateBtn');

            if (!reportType || !dateRange) {
                alert("Please select both a Report Type and a Date Range.");
                return; 
            }

            generateBtn.innerText = "Loading...";
            generateBtn.disabled = true;

            // 1. Setup the Time Filter Logic!
            const now = new Date();
            let startTime = 0; // Default to All Time
            
            if (dateRange === "Today") {
                now.setHours(0, 0, 0, 0); // Midnight this morning
                startTime = now.getTime();
            } else if (dateRange === "Last 7 Days") {
                startTime = now.getTime() - (7 * 24 * 60 * 60 * 1000);
            } else if (dateRange === "Last 30 Days") {
                startTime = now.getTime() - (30 * 24 * 60 * 60 * 1000);
            } else if (dateRange === "This Month") {
                const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
                startTime = firstDay.getTime();
            }

            try {
                // Prepare dynamic HTML Containers
                const summaryContainer = document.getElementById('dynamicSummaryCards');
                const theadContainer = document.getElementById('dynamicTableHeader');
                const tbodyContainer = document.getElementById('reportTableBody');
                
                let recordsArray = [];
                let tableHTML = "";

                // ----------------------------------------------------
                // LOGIC A: IF THEY SELECT 'COLLECTION SUMMARY'
                // ----------------------------------------------------
                if (reportType === "Collection Summary") {
                    
                    // Setup UI for Collections
                    summaryContainer.innerHTML = `
                        <div class="card"><h3>Total Collections</h3><p class="card-value" id="totalCollections">0</p></div>
                        <div class="card"><h3>Total Weight Collected</h3><p class="card-value" id="totalWeight">0 kg</p></div>
                        <div class="card"><h3>Active Collectors</h3><p class="card-value" id="activeCollectors">0</p></div>
                    `;
                    theadContainer.innerHTML = `<tr><th>Date</th><th>Item Type</th><th>Weight (kg)</th><th>Address</th><th>Status</th></tr>`;

                    // Fetch data
                    const querySnapshot = await getDocs(collection(window.db, "request"));
                    let totalCollections = 0;
                    let totalWeight = 0;
                    let uniqueCollectors = new Set();

                    querySnapshot.forEach((docSnap) => {
                        const reqData = docSnap.data();
                        
                        // Extract Date
                        let sortValue = 0;
                        let displayDate = "N/A";
                        let rawDate = reqData.createdAt;

                        if (rawDate) {
                            if (rawDate.toDate) { 
                                sortValue = rawDate.toDate().getTime(); 
                                displayDate = rawDate.toDate().toLocaleDateString(); 
                            } else { 
                                sortValue = new Date(rawDate).getTime();
                                displayDate = String(rawDate).substring(0, 10);
                            }
                        }

                        // ** THE FILTER: If this record is older than the selected timeframe, skip it! **
                        if (startTime > 0 && sortValue < startTime) return;

                        totalCollections++; 
                        totalWeight += Number(reqData.weight) || 0; 
                        if (reqData.collectorId) uniqueCollectors.add(reqData.collectorId);

                        const status = reqData.status ? reqData.status.toLowerCase() : "pending";
                        let badgeStyles = "padding: 5px 10px; border-radius: 4px; font-size: 13px; font-weight: bold; ";
                        let displayStatus = "Pending";
                        
                        if (status === "pending") {
                            badgeStyles += "background-color: #fff3cd; color: #856404;"; // Yellow
                        } else if (status === "accepted") {
                            displayStatus = "In Progress";
                            badgeStyles += "background-color: #cce5ff; color: #004085;"; // Blue
                        } else if (status === "completed") {
                            displayStatus = "Completed";
                            badgeStyles += "background-color: #d4edda; color: #155724;"; // Green
                        }

                        recordsArray.push({
                            timestamp: sortValue,
                            html: `
                                <tr>
                                    <td>${displayDate}</td>
                                    <td><span style="text-transform: capitalize;">${reqData.category || '-'}</span></td>
                                    <td>${reqData.weight || '0'} kg</td>
                                    <td>${reqData.pickupAddress || reqData.address || '-'}</td>
                                    <td><span style="${badgeStyles}">${displayStatus}</span></td>
                                </tr>
                            `
                        });
                    });

                    // Update UI Numbers
                    document.getElementById('totalCollections').innerText = totalCollections;
                    document.getElementById('totalWeight').innerText = Math.round(totalWeight * 100) / 100 + " kg";
                    document.getElementById('activeCollectors').innerText = uniqueCollectors.size;
                } 

                // ----------------------------------------------------
                // LOGIC B: IF THEY SELECT 'USER SUMMARY'
                // ----------------------------------------------------
                else if (reportType === "User Summary") {
                    
                    // Setup UI for Users
                    summaryContainer.innerHTML = `
                        <div class="card"><h3>Total Accounts</h3><p class="card-value" id="totalAccounts">0</p></div>
                        <div class="card"><h3>Normal Users</h3><p class="card-value" id="totalNormalUsers">0</p></div>
                        <div class="card"><h3>Active Collectors</h3><p class="card-value" id="totalCollectors">0</p></div>
                    `;
                    theadContainer.innerHTML = `<tr><th>Account ID</th><th>Full Name</th><th>Role</th><th>Email Address</th><th>Phone</th></tr>`;

                    // Fetch Users
                    const querySnapshot = await getDocs(collection(window.db, "users"));
                    let totalAccounts = 0;
                    let totalNormalUsers = 0;
                    let totalCollectors = 0;

                    querySnapshot.forEach((docSnap) => {
                        const userData = docSnap.data();
                        
                        // Extract Date
                        let sortValue = 0;
                        if (userData.createdAt) {
                            if (userData.createdAt.toDate) { 
                                sortValue = userData.createdAt.toDate().getTime(); 
                            } else { 
                                sortValue = new Date(userData.createdAt).getTime();
                            }
                        }

                        // ** THE FILTER: If we don't have a date for an old user, but the Admin selected "Today", skip them! **
                        if (startTime > 0 && sortValue < startTime) return;

                        totalAccounts++;
                        const role = userData.role ? userData.role.toLowerCase() : "user";
                        
                        let badgeClass = "background-color: #007bff; color: white;";
                        let displayRole = "User";
                        
                        if (role === "admin") {
                            displayRole = "Admin";
                            badgeClass = "background-color: #333; color: white;";
                        } else if (role === "collector") {
                            displayRole = "Collector";
                            badgeClass = "background-color: #008040; color: white;";
                            totalCollectors++;
                        } else {
                            totalNormalUsers++;
                        }

                        const shortId = "#" + docSnap.id.substring(0, 6).toUpperCase();

                        recordsArray.push({
                            timestamp: sortValue,
                            html: `
                                <tr>
                                    <td style="font-weight: bold; color: #555;">${shortId}</td>
                                    <td>${userData.fullName || 'N/A'}</td>
                                    <td><span style="padding: 4px 10px; border-radius: 4px; font-size: 13px; font-weight: bold; ${badgeClass}">${displayRole}</span></td>
                                    <td>${userData.email || 'N/A'}</td>
                                    <td>${userData.phone || 'N/A'}</td>
                                </tr>
                            `
                        });
                    });

                    // Update UI Numbers
                    document.getElementById('totalAccounts').innerText = totalAccounts;
                    document.getElementById('totalNormalUsers').innerText = totalNormalUsers;
                    document.getElementById('totalCollectors').innerText = totalCollectors;
                }

                // --- FINAL RENDER PROCESS ---
                // Sort the array (Newest dates at the top)
                recordsArray.sort((a, b) => b.timestamp - a.timestamp);

                // Combine array back into one long HTML string
                recordsArray.forEach(record => {
                    tableHTML += record.html;
                });
                
                // Inject the rows into the table
                tbodyContainer.innerHTML = tableHTML || "<tr><td colspan='5' style='text-align:center; padding: 30px; color: #888;'>No records found for this timeframe.</td></tr>";

                // Reveal the report
                document.getElementById('reportTitle').innerText = reportType + " Report (" + dateRange + ")";
                document.getElementById('reportResult').style.display = 'block';

            } catch (error) {
                console.error("Error loading report:", error);
                alert("Failed to load report data. Please try again.");
            }

            generateBtn.innerText = "Generate Report";
            generateBtn.disabled = false;
        };

        window.exportPDF = function() {
            const reportResult = document.getElementById('reportResult');
            if (reportResult.style.display === 'none') {
                alert("Please generate a report first before exporting.");
                return;
            }
            window.print(); 
        };

        // --- FIXED DROPDOWN & LOGOUT FUNCTIONS ---
        window.toggleProfileMenu = function() {
            document.getElementById("profileDropdown").classList.toggle("show-dropdown");
        };

        window.onclick = function(event) {
            if (!event.target.closest('.user-profile-top')) {
                const dropdowns = document.getElementsByClassName("profile-dropdown");
                for (let i = 0; i < dropdowns.length; i++) {
                    if (dropdowns[i].classList.contains('show-dropdown')) {
                        dropdowns[i].classList.remove('show-dropdown');
                    }
                }
            }
        };

        window.logoutUser = function(event) {
            event.preventDefault(); 
            const confirmLogout = confirm("Are you sure you want to log out?");
            
            if (confirmLogout) {
                signOut(auth).then(() => {
                    window.location.href = "login_page.html";
                }).catch((error) => {
                    alert("Error logging out: " + error.message);
                });
            }
        };
    </script>
</body>
</html>
