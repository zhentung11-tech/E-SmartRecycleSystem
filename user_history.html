<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Smart Recycle - Request History</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="user_history.css">
</head>
<body>

    <header class="top-nav-green">
        <div class="logo-section-top">
        <img src="logo.png" alt="E-Smart Recycle Logo" style="width: 50px; height: auto;">
            <a href="login_page.html" style="text-decoration: none;"><h1>E-Smart Recycle</h1></a>
        </div>
        <div class="user-profile-top">
            <span>Name</span>
            <div class="profile-circle-gray">
                <i class="fas fa-user"></i>
            </div>
        </div>
    </header>

    <div class="layout-container">
        
        <aside class="sidebar-left">
            <ul class="sidebar-menu">
                <li><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="selectpickup.html"><i class="fas fa-box"></i> Submit Item</a></li>
                <li><a href="user_history.html" class="active"><i class="fas fa-history"></i> Request History</a></li>
                <li><a href="user_notification.html"><i class="fas fa-bell"></i> Notification</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="history-card">
                
                <h2 class="serif-heading-large">My Request History</h2>

                <div class="gray-header-bar">
                    <span>Record of Submitted Items</span>
                </div>

                <div class="table-container">
                   <table class="history-table">
                        <thead>
                            <tr>
                                <th>Request ID</th>
                                <th>Date Submitted</th>
                                <th>Item Type</th>
                                <th>Quantity</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody">
                            <tr>
                                <td colspan="5" style="text-align: center; padding: 20px;">Loading your history...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </main>
    </div>

   <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // Your exact Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyC5yA_CKK4xZ8bsx-Qutca7lym6i5oJdpo",
            authDomain: "e-smartrecyclesystem.firebaseapp.com",
            projectId: "e-smartrecyclesystem",
            storageBucket: "e-smartrecyclesystem.firebasestorage.app",
            messagingSenderId: "212695525607",
            appId: "1:212695525607:web:61d0df7011aa8baf265a42"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

                    on AuthStateChanged(auth, async (user) => {
                    if (user) {
                        const userRef = doc(db, "users", user.uid);
                        const userSnap = await getDoc(userRef);
                        if (userSnap.exists()) {
                            // Find the userNameDisplay ID on whatever page is open, and inject the name!
                            const nameElement = document.getElementById('userNameDisplay');
                            if (nameElement) {
                                nameElement.innerText = userSnap.data().fullName;
                            }
                        }
                    } else {
                        window.location.href = "index.html"; // Kick to login
                    }
                });

                // 2. FETCH HISTORY FROM FIRESTORE
                const q = query(collection(db, "request"), where("userId", "==", user.uid));
                const querySnapshot = await getDocs(q);

                let tableHTML = "";

                // 3. IF NO REQUESTS EXIST
                if (querySnapshot.empty) {
                    tableHTML = "<tr><td colspan='5' style='text-align: center; padding: 20px;'>No history found. You haven't made any requests yet!</td></tr>";
                } else {
                    // 4. LOOP THROUGH EACH REQUEST AND CREATE A ROW
                    querySnapshot.forEach((docSnap) => {
                        const reqData = docSnap.data();
                        
                        // Create a short, fake ID based on the Firestore Document ID
                        const shortId = "#" + docSnap.id.substring(0, 6).toUpperCase(); 
                        
                        // Check status to apply the correct CSS color badge
                        const status = reqData.status ? reqData.status.toLowerCase() : "pending";
                        let badgeClass = "badge-pending"; // Default orange
                        
                        if (status === "accepted" || status === "completed") {
                            badgeClass = "badge-accepted"; // Green
                        } else if (status === "rejected") {
                            badgeClass = "badge-rejected"; // Red
                        }

                        // Capitalize the first letter for display
                        const displayStatus = status.charAt(0).toUpperCase() + status.slice(1);

                        // Use the creation date we set up in the selectpickup file
                        const displayDate = reqData.createdAt ? reqData.createdAt.substring(0, 10) : reqData.scheduledDate.substring(0, 10);

                        // Add the row to our HTML block
                        tableHTML += `
                            <tr>
                                <td>${shortId}</td>
                                <td>${displayDate}</td>
                                <td>${reqData.category}</td>
                                <td>${reqData.weight} Kg</td>
                                <td><span class="status-badge ${badgeClass}">${displayStatus}</span></td>
                            </tr>
                        `;
                    });
                }

                // 5. INJECT HTML INTO THE TABLE
                document.getElementById('historyTableBody').innerHTML = tableHTML;

            } else {
                // Kick to login page if they aren't signed in
                window.location.href = "index.html";
            }
        });
    </script>

</body>
</html>
