<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Smart Recycle - User Dashboard</title>
    <link rel="stylesheet" href="dashstyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="top-nav">
        <div class="logo-section">
            <img src="logo.png" alt="E-Smart Recycle Logo" class="nav-logo">
            <a href="login_page.html" style="text-decoration: none;"><h1>E-Smart Recycle</h1></a>
        </div>
        <div class="user-profile" aria-label="User Menu" tabindex="0">
            <span id="userNameDisplay">Loading...</span>
            <div class="profile-circle">
                <i class="fas fa-user" aria-hidden="true"></i>
            </div>
        </div>
    </header>

    <nav class="sub-menu" aria-label="Main Navigation">
        <ul class="nav-links">
            <li><a href="dashboard.html" class="nav-item active" aria-current="page"><i class="fas fa-home"></i> Dashboard</a></li>
            <li><a href="selectpickup.html" class="nav-item"><i class="fas fa-box"></i> Submit Item</a></li>
            <li><a href="user_history.html" class="nav-item"><i class="fas fa-history"></i> Request History</a></li>
            <li><a href="user_notification.html" class="nav-item"><i class="fas fa-bell"></i> Notification</a></li>
        </ul>
    </nav>

    <main class="dashboard-container">
        <div class="stats-row">
            <div class="stat-card">
                <h3>Total Requests</h3>
                <p id="total-requests">0</p>
            </div>
            <div class="stat-card">
                <h3>Pending</h3>
                <p id="pending-requests">0</p>
            </div>
            <div class="stat-card">
                <h3>Completed Requests</h3>
                <p id="completed-requests">0</p>
            </div>
        </div>

        <div class="action-section">
            <a href="selectpickup.html" class="btn-submit-large" style="display: block; text-align: center; text-decoration: none; box-sizing: border-box;" aria-label="Submit a new recyclable item">
                Submit Recyclable Item
            </a>
        </div>
        
        <div class="table-section">
            <h2 class="serif-heading">Recent Requests</h2>
            <div class="table-responsive">
                <table class="requests-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Item Type</th>
                            <th>Quantity</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="recentRequestsTableBody">
                        <tr>
                            <td colspan="4" style="text-align: center; padding: 20px;">No recent requests yet. Start recycling!</td>
                        </tr>
                    </tbody>
                </table>

             <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        
        // Import Firestore tools! We need query, where, and getDocs to search for the user's specific requests
        import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // Your exact Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyC5yA_CKK4xZ8bsx-Qutca7lym6i5oJdpo",
            authDomain: "e-smartrecyclesystem.firebaseapp.com",
            projectId: "e-smartrecyclesystem",
            storageBucket: "e-smartrecyclesystem.firebasestorage.app",
            messagingSenderId: "212695525607",
            appId: "1:212695525607:web:61d0df7011aa8baf265a42"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Runs automatically when the dashboard loads
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // 1. FETCH USER NAME
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) {
                    document.getElementById('userNameDisplay').innerText = userSnap.data().fullName;
                }

                // 2. FETCH REQUESTS FOR THIS SPECIFIC USER
                // This searches the 'request' collection where the userId matches the logged-in user
                const q = query(collection(db, "request"), where("userId", "==", user.uid));
                const querySnapshot = await getDocs(q);

                // Set up our counters
                let totalCount = 0;
                let pendingCount = 0;
                let completedCount = 0;
                let tableHTML = "";

                // 3. IF NO REQUESTS FOUND
                if (querySnapshot.empty) {
                    tableHTML = "<tr><td colspan='4' style='text-align: center; padding: 20px;'>No recent requests yet. Start recycling!</td></tr>";
                } else {
                    // 4. IF REQUESTS EXIST, LOOP THROUGH THEM
                    querySnapshot.forEach((docSnap) => {
                        const reqData = docSnap.data();
                        totalCount++; // Add 1 to total

                        // Count statuses (convert to lowercase just to be safe)
                        const status = reqData.status ? reqData.status.toLowerCase() : "pending";
                        if (status === "pending") pendingCount++;
                        if (status === "completed") completedCount++;

                        // Choose badge color based on status
                        const badgeClass = (status === "pending") ? "pending" : "complete";
                        
                        // Capitalize the first letter of the status for the table
                        const displayStatus = status.charAt(0).toUpperCase() + status.slice(1);

                        // Build a new row for the table
                        tableHTML += `
                            <tr>
                                <td>${reqData.scheduledDate.substring(0, 10)}</td>
                                <td>${reqData.category}</td>
                                <td>${reqData.weight} Kg</td>
                                <td><span class="status-badge ${badgeClass}">${displayStatus}</span></td>
                            </tr>
                        `;
                    });
                }

                // 5. UPDATE THE HTML ON THE SCREEN
                document.getElementById('total-requests').innerText = totalCount;
                document.getElementById('pending-requests').innerText = pendingCount;
                document.getElementById('completed-requests').innerText = completedCount;
                document.getElementById('recentRequestsTableBody').innerHTML = tableHTML;

            } else {
                // SECURITY: Kick them to login if not authenticated
                window.location.href = "index.html";
            }

            // 6. Wait to see who is logged in
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    // 2. Point to this specific user's file in the "users" collection
                    const userRef = doc(db, "users", user.uid);
                    
                    // 3. Download the file
                    const userSnap = await getDoc(userRef);
                    
                    if (userSnap.exists()) {
                        const userData = userSnap.data();
                        
                        // 4. Grab the fullName from the database and inject it into the HTML!
                        document.getElementById('userNameDisplay').innerText = userData.fullName;
                    }
                } else {
                    // If nobody is logged in, kick them back to the login page
                    window.location.href = "index.html";
                }
            });
        });
    </script>
    </head>
