<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Smart Recycle - User Dashboard</title>
    <link rel="stylesheet" href="dashstyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Exact Dropdown Styling to match the rest of your system */
        .profile-dropdown-container {
            position: relative;
            display: inline-block;
            font-family: Arial, sans-serif;
        }
        
        .dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 50px;
            background-color: white;
            min-width: 160px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.15);
            border-radius: 4px;
            z-index: 1000;
            overflow: hidden;
            flex-direction: column;
        }

        .dropdown-menu.show {
            display: flex;
        }

        .dropdown-menu a {
            color: #333;
            padding: 12px 20px;
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background-color 0.2s;
        }

        .dropdown-menu a:hover {
            background-color: #f5f5f5;
        }

        .dropdown-menu hr {
            margin: 0;
            border: none;
            border-top: 1px solid #eee;
        }

        .profile-circle-gray {
            background-color: #545454;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header class="top-nav">
        <div class="logo-section">
            <img src="logo.png" alt="E-Smart Recycle Logo" class="nav-logo">
            <a href="dashboard.html" style="text-decoration: none;"><h1>E-Smart Recycle</h1></a>
        </div>
        
        <div class="user-profile-top" style="display: flex; align-items: center; gap: 10px; font-family: Arial, sans-serif;">
            <span id="userNameDisplay">Loading...</span>
            <div class="profile-dropdown-container">
                <div class="profile-circle-gray" onclick="toggleDropdown()">
                    <i class="fas fa-user"></i>
                </div>
                
                <div class="dropdown-menu" id="profileDropdown">
                    <a href="user_profile.html"><i class="fas fa-user-circle"></i> Profile</a>
                    <hr>
                    <a href="login_page.html" onclick="logoutUser(event)"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </div>
            </div>
        </div>
    </header>

    <nav class="sub-menu" aria-label="Main Navigation">
        <ul class="nav-links">
            <li><a href="dashboard.html" class="nav-item active" aria-current="page"><i class="fas fa-home"></i> Dashboard</a></li>
            <li><a href="selectpickup.html" class="nav-item"><i class="fas fa-box"></i> Submit Item</a></li>
            <li><a href="user_history.html" class="nav-item"><i class="fas fa-history"></i> Request History</a></li>
            <li><a href="user_notification.html" class="nav-item"><i class="fas fa-bell"></i> Notification</a></li>
        </ul>
    </nav>

    <main class="dashboard-container">
        <div class="stats-row">
            <div class="stat-card">
                <h3>Total Requests</h3>
                <p id="total-requests">0</p>
            </div>
            <div class="stat-card">
                <h3>Pending</h3>
                <p id="pending-requests">0</p>
            </div>
            <div class="stat-card">
                <h3>Completed Requests</h3>
                <p id="completed-requests">0</p>
            </div>
        </div>

        <div class="action-section">
            <a href="selectpickup.html" class="btn-submit-large" style="display: block; text-align: center; text-decoration: none; box-sizing: border-box;" aria-label="Submit a new recyclable item">
                Submit Recyclable Item
            </a>
        </div>
        
        <div class="table-section">
            <h2 class="serif-heading">Recent Requests</h2>
            <div class="table-responsive">
                <table class="requests-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Item Type</th>
                            <th>Quantity</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="recentRequestsTableBody">
                        <tr>
                            <td colspan="4" style="text-align: center; padding: 20px;">No recent requests yet. Start recycling!</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        // Added signOut here!
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // Your exact Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyC5yA_CKK4xZ8bsx-Qutca7lym6i5oJdpo",
            authDomain: "e-smartrecyclesystem.firebaseapp.com",
            projectId: "e-smartrecyclesystem",
            storageBucket: "e-smartrecyclesystem.firebasestorage.app",
            messagingSenderId: "212695525607",
            appId: "1:212695525607:web:61d0df7011aa8baf265a42"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Runs automatically when the dashboard loads
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // 1. FETCH USER NAME
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) {
                    document.getElementById('userNameDisplay').innerText = userSnap.data().fullName;
                }

                // 2. FETCH REQUESTS FOR THIS SPECIFIC USER
                const q = query(collection(db, "request"), where("userId", "==", user.uid));
                const querySnapshot = await getDocs(q);

                let totalCount = 0;
                let pendingCount = 0;
                let completedCount = 0;
                let tableHTML = "";

                // 3. PROCESS REQUESTS
                if (querySnapshot.empty) {
                    tableHTML = "<tr><td colspan='4' style='text-align: center; padding: 20px;'>No recent requests yet. Start recycling!</td></tr>";
                } else {
                    querySnapshot.forEach((docSnap) => {
                        const reqData = docSnap.data();
                        totalCount++;

                        const status = reqData.status ? reqData.status.toLowerCase() : "pending";
                        if (status === "pending" || status === "accepted") pendingCount++;
                        if (status === "completed") completedCount++;

                        const badgeClass = (status === "completed") ? "complete" : "pending";
                        const displayStatus = status.charAt(0).toUpperCase() + status.slice(1);

                        // Ensure date exists
                        const displayDate = reqData.scheduledDate ? reqData.scheduledDate.substring(0, 10) : "Recent";

                        tableHTML += `
                            <tr>
                                <td>${displayDate}</td>
                                <td>${reqData.category || '-'}</td>
                                <td>${reqData.weight || '0'} Kg</td>
                                <td><span class="status-badge ${badgeClass}">${displayStatus}</span></td>
                            </tr>
                        `;
                    });
                }

                // 4. UPDATE HTML ON THE SCREEN
                document.getElementById('total-requests').innerText = totalCount;
                document.getElementById('pending-requests').innerText = pendingCount;
                document.getElementById('completed-requests').innerText = completedCount;
                document.getElementById('recentRequestsTableBody').innerHTML = tableHTML;

            } else {
                // SECURITY: Kick them to login if not authenticated
                window.location.href = "login_page.html";
            }
        });

        // --- DROPDOWN & LOGOUT FUNCTIONS ---

        window.toggleDropdown = function() {
            document.getElementById("profileDropdown").classList.toggle("show");
        };

        window.onclick = function(event) {
            if (!event.target.closest('.profile-dropdown-container')) {
                const dropdowns = document.getElementsByClassName("dropdown-menu");
                for (let i = 0; i < dropdowns.length; i++) {
                    if (dropdowns[i].classList.contains('show')) {
                        dropdowns[i].classList.remove('show');
                    }
                }
            }
        };

        window.logoutUser = function(event) {
            event.preventDefault(); // STOPS the browser from instantly jumping to the login page!
            
            const confirmLogout = confirm("Are you sure you want to log out?");
            
            if (confirmLogout) {
                signOut(auth).then(() => {
                    // Session killed successfully, NOW we redirect safely
                    window.location.href = "login_page.html"; 
                }).catch((error) => {
                    alert("Error logging out: " + error.message);
                });
            }
        };

    </script>
</body>
</html>
