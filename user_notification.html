<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Smart Recycle - User Notifications</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="user_notification.css">
</head>
<body>

    <header class="top-nav-green">
        <div class="logo-section-top">
            <img src="logo.png" alt="E-Smart Recycle Logo" style="width: 50px; height: auto;">
            <a href="login_page.html" style="text-decoration: none;"><h1>E-Smart Recycle</h1></a>
        </div>

           <div class="user-profile-top">
            <span id="userNameDisplay">Loading...</span>
            <div class="profile-dropdown-container">
                <div class="profile-circle-gray" onclick="toggleDropdown()" style="cursor: pointer;">
                    <i class="fas fa-user"></i>
                </div>
                
                <div class="dropdown-menu" id="profileDropdown">
                    <a href="user_profile.html"><i class="fas fa-user-circle"></i> Profile</a>
                    <hr style="margin: 0; border: none; border-top: 1px solid #ddd;">
                    <a href="login_page.html" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </div>
            </div>
        </div>
    </header>

    <div class="layout-container">
        
        <aside class="sidebar-left">
            <ul class="sidebar-menu">
                <li><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="selectpickup.html"><i class="fas fa-box"></i> Submit Item</a></li>
                <li><a href="user_history.html"><i class="fas fa-history"></i> Request History</a></li>
                <li><a href="user_notification.html" class="active"><i class="fas fa-bell"></i> Notification</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="history-card">
                
                <h2 class="serif-heading-large">My Notifications</h2>
                
                <div class="gray-header-bar">
                    <span>Recent Updates</span>
                    <button onclick="markAllAsRead()" id="markReadBtn" style="background: none; border: none; color: #00B050; font-weight: bold; cursor: pointer; font-size: 14px;">
                        <i class="fas fa-check-double"></i> Mark all as read
                    </button>
                </div>

                <div class="notification-list" id="notifList">
                    <p style="text-align: center; color: #888; padding: 30px;">Loading notifications...</p>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // Your exact Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyC5yA_CKK4xZ8bsx-Qutca7lym6i5oJdpo",
            authDomain: "e-smartrecyclesystem.firebaseapp.com",
            projectId: "e-smartrecyclesystem",
            storageBucket: "e-smartrecyclesystem.firebasestorage.app",
            messagingSenderId: "212695525607",
            appId: "1:212695525607:web:61d0df7011aa8baf265a42"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // 1. FETCH USER NAME FOR THE TOP RIGHT
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) {
                    document.getElementById('userNameDisplay').innerText = userSnap.data().fullName;
                }

                // 2. FETCH REQUESTS TO BUILD NOTIFICATIONS
                const q = query(collection(db, "request"), where("userId", "==", user.uid));
                const querySnapshot = await getDocs(q);

                let notifHTML = "";

                // 3. ALWAYS ADD THE WELCOME NOTIFICATION AT THE BOTTOM
                notifHTML += `
                    <div class="user-notif-item">
                        <div class="notif-content-wrapper">
                            <div class="notif-icon-circle bg-gray"><i class="fas fa-star"></i></div>
                            <div class="notif-content-area">
                                <div class="notif-header">
                                    <h3>Welcome to E-Smart Recycle</h3>
                                    <span>System</span>
                                </div>
                                <p>Thank you for joining us! Start submitting your recyclable items today to keep the environment clean.</p>
                            </div>
                        </div>
                        <button class="dismiss-btn" onclick="dismissNotif(this)" title="Dismiss"><i class="fas fa-times"></i></button>
                    </div>
                `;

                // 4. LOOP THROUGH REQUESTS AND ADD A NOTIFICATION FOR EACH ONE
                querySnapshot.forEach((docSnap) => {
                    const reqData = docSnap.data();
                    const status = reqData.status ? reqData.status.toLowerCase() : "pending";
                    
                    let iconClass = "bg-orange";
                    let icon = "fa-clock";
                    let title = "Pickup Request Submitted";
                    let message = `Your request for ${reqData.weight} Kg of ${reqData.category} has been received and is waiting for a collector.`;

                    if (status === "accepted" || status === "completed") {
                        iconClass = "bg-green";
                        icon = "fa-check";
                        title = "Pickup Request Accepted!";
                        message = `Your request for ${reqData.weight} Kg of ${reqData.category} has been accepted by a collector! They will arrive soon.`;
                    }

                    // Prepend the new notification so it shows up ABOVE the welcome message
                    notifHTML = `
                        <div class="user-notif-item unread">
                            <div class="notif-content-wrapper">
                                <div class="notif-icon-circle ${iconClass}"><i class="fas ${icon}"></i></div>
                                <div class="notif-content-area">
                                    <div class="notif-header">
                                        <h3>${title}</h3>
                                        <span>${reqData.createdAt ? reqData.createdAt.substring(0, 10) : 'Recent'}</span>
                                    </div>
                                    <p>${message}</p>
                                </div>
                            </div>
                            <button class="dismiss-btn" onclick="dismissNotif(this)" title="Dismiss"><i class="fas fa-times"></i></button>
                        </div>
                    ` + notifHTML; 
                });

                // 5. INJECT ALL NOTIFICATIONS INTO THE PAGE
                document.getElementById('notifList').innerHTML = notifHTML;

            } else {
                window.location.href = "index.html"; // Kick to login
            }
        });

        // --- THESE ARE YOUR ORIGINAL UI FUNCTIONS ---
        window.dismissNotif = function(buttonElement) {
            const notifItem = buttonElement.closest('.user-notif-item');
            notifItem.style.opacity = "0";
            notifItem.style.transform = "translateX(20px)";
            
            setTimeout(() => {
                notifItem.remove();
                checkIfEmpty();
            }, 300);
        }

        window.markAllAsRead = function() {
            const unreadItems = document.querySelectorAll('.user-notif-item.unread');
            
            if (unreadItems.length === 0) {
                alert("All notifications are already read!");
                return;
            }

            unreadItems.forEach(item => {
                item.classList.remove('unread');
            });

            const btn = document.getElementById('markReadBtn');
            btn.innerHTML = "<i class='fas fa-check'></i> All caught up!";
            btn.style.color = "#888";
            btn.style.cursor = "default";
        }

        window.checkIfEmpty = function() {
            const list = document.getElementById('notifList');
            if (list.children.length === 0) {
                list.innerHTML = "<p style='text-align: center; color: #888; font-family: Arial, sans-serif; padding: 30px;'>You have no new notifications.</p>";
            }
        }

      // --- DROPDOWN & LOGOUT FUNCTIONS ---

        // 1. Attach toggle function to the window so HTML can see it
        window.toggleDropdown = function() {
            document.getElementById("profileDropdown").classList.toggle("show");
        }

        // 2. Attach the click-away closer to the window
        window.onclick = function(event) {
            if (!event.target.closest('.profile-dropdown-container')) {
                const dropdowns = document.getElementsByClassName("dropdown-menu");
                for (let i = 0; i < dropdowns.length; i++) {
                    if (dropdowns[i].classList.contains('show')) {
                        dropdowns[i].classList.remove('show');
                    }
                }
            }
        }

        // 3. Use actual Firebase Authentication Sign Out
        window.logout = function() {
            const confirmLogout = confirm("Are you sure you want to log out?");
            
            if (confirmLogout) {
                // This talks to your E-Smart Recycle Firebase backend to kill the session
                signOut(auth).then(() => {
                    // Sign-out successful, NOW we send them to the login page
                    window.location.href = "login_page.html"; 
                }).catch((error) => {
                    // Just in case something goes wrong
                    alert("Error logging out: " + error.message);
                });
            }
        }
        
    </script>

    
</body>
</html>
