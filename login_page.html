<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Smart Recycle - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="login_page.css">
</head>
<body>

    <header class="top-nav-green">
        <div class="logo-section-top">
        <img src="logo.png" alt="E-Smart Recycle Logo" style="width: 50px; height: auto;">            
            <a href="login_page.html" style="text-decoration: none;"><h1>E-Smart Recycle</h1></a>
        </div>
        <div class="user-profile-top">
            <div class="profile-circle-gray">
                <i class="fas fa-user"></i>
            </div>
        </div>
    </header>

    <div class="layout-container">
        
        <aside class="sidebar-left">
            <ul class="sidebar-menu">
                <li><a href="#"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="#"><i class="fas fa-box"></i> Submit Item</a></li>
                <li><a href="#"><i class="fas fa-history"></i> Request History</a></li>
                <li><a href="#"><i class="fas fa-bell"></i> Notification</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="login-card">
                
                <div class="form-header">
                <img src="logo.png" alt="E-Smart Recycle Logo" style="width: 50px; height: auto;">                    <h2>E-Smart Recycle<br><span>System</span></h2>
                </div>

                <div class="login-title">Login</div>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    
               <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="Email" required>
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="xxxx" required>
                    </div>

                    <div class="options-row">
                        <div class="remember-me">
                            <input type="checkbox" id="remember">
                            <label for="remember">Remember me</label>
                        </div>
                        
                        <div class="role-selector">
                            <label><input type="radio" name="userRole" value="user" required checked> User</label>
                            <label><input type="radio" name="userRole" value="collector"> Collector</label>
                        </div>
                    </div>

                    <button type="submit" class="btn-login">Login</button>
                    
                    <div class="signup-link">
                        Don't have an account? <a href="signup.html">Sign up</a>
                    </div>
                </form>
            </div>
        </main>
    </div>

<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        // 1. Import Auth for Login
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        // 2. Import Firestore to check their role
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // Your exact Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyC5yA_CKK4xZ8bsx-Qutca7lym6i5oJdpo",
            authDomain: "e-smartrecyclesystem.firebaseapp.com",
            projectId: "e-smartrecyclesystem",
            storageBucket: "e-smartrecyclesystem.firebasestorage.app",
            messagingSenderId: "212695525607",
            appId: "1:212695525607:web:61d0df7011aa8baf265a42"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // This runs when they click the "Login" button
        window.handleLogin = async function(event) {
            event.preventDefault(); 
            
            // 1. Grab what they typed/selected
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const selectedRole = document.querySelector('input[name="userRole"]:checked').value;

            try {
                // 2. Check email and password with Firebase Authentication
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 3. Open their file in Firestore to find their TRUE role
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);

                if (userSnap.exists()) {
                    const actualRole = userSnap.data().role; // This is the role they chose during Sign Up!

                    // 4. SECURITY CHECK: Did they click the right radio button?
                    if (selectedRole !== actualRole) {
                        alert("Login Failed: You selected " + selectedRole + ", but you are registered as a " + actualRole + ".");
                        // You can automatically sign them out here if they choose the wrong role
                        auth.signOut();
                        return; 
                    }

                    // 5. SUCCESS! Route them to the correct dashboard
                    if (actualRole === "collector") {
                        window.location.href = "collector_dashboard.html";
                    } else {
                        window.location.href = "dashboard.html";
                    }

                } else {
                    alert("Error: User profile not found in database.");
                }

            } catch (error) {
                // This catches wrong passwords, unregistered emails, etc.
                alert("Login Failed: Incorrect Email or Password.");
            }
        };
    </script>
    
</body>
</html>
